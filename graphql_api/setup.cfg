[tox:tox]
isolated_build = true
envlist = py312

[gh-actions]
python =
    3.12: py312

[testenv]
allowlist_externals = pytest
dependency_groups = dev
passenv = *
setenv =
    DEPLOYMENT_STAGE = TEST
    AWS_DEFAULT_REGION = us-east-1
    AWS_ACCESS_KEY_ID = testing
    AWS_SECRET_ACCESS_KEY = testing
commands =
    pytest tests/ -v --junitxml=junit.xml {posargs}
