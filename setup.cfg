[coverage:run]
# uncomment the following to omit files during running
omit = graphql_api/tests/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    def main

[tox:tox]
isolated_build = true
envlist = audit, py312, format, lint

[gh-actions]
python =
    3.12: py312, format, lint

[testenv]
allowlist_externals = pytest
dependency_groups = dev
passenv = *
setenv =
    PYTHONPATH = {toxinidir}
    PYTHONWARNINGS = ignore
    TESTING = 1
    SLS_OFFLINE = 1
commands =
    pytest --cov-config=setup.cfg --cov=graphql_api --cov-branch --cov-report=xml --cov-report=term-missing

[testenv:audit]
allowlist_externals =
	uv
commands =
    uv export --format requirements-txt --no-emit-project --output-file audit.txt
    uv run pip-audit -r audit.txt --require-hashes
	uv run safety scan

[testenv:format]
allowlist_externals =
    ruff
dependency_groups = dev
commands =
    ruff format --check graphql_api

[testenv:lint]
allowlist_externals =
    ruff
    mypy
dependency_groups = dev
commands =
    ruff check graphql_api auth
    mypy auth/authorizer/handler.py
    # mypy graphql_api
