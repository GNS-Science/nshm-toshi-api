# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: dailyscience
# "app" enables Serverless Framework Dashboard features and sharing them with other Services.
app: spike-toshi-api
service: spike-toshi-api

plugins:
  - serverless-wsgi
  - serverless-s3-local
  - serverless-dynamodb
  - serverless-plugin-warmup
package:
  individually: false
  exclude:
    - .env
    - .env.*
    - .git/**
    - .pytest_cache/**
    - .tox/**
    - bin/**
    - demo/**
    - lib/**
    - node_modules/**
    - prof/**
    - package.json
    - package-log.json
    - node_modules/**

custom:
  #serverless-wsgi settings
  wsgi:
    app: graphql_api.api.app
    packRequirements: false
    pythonBin: python3

  #serverless-python-requirements settings
  pythonRequirements:
    dockerizePip: non-linux
    slim: true
    slimPatterns:
      - '**/*.egg-info*'
    noDeploy:
      - boto3
      - botocore

  #serverless-s3-local settings
  s3:
    host: localhost
    directory: /tmp
  #dynamodb-local settings
  serverless-dynamodb:
  # If you only want to use DynamoDB Local in some stages, declare them here
    stages:
      - local
    start:
      port: 8000
      inMemory: true
      heapInitial: 200m
      heapMax: 1g
      sharedDb: true

  #Lambda warmer see https://www.serverless.com/plugins/serverless-plugin-warmup
  warmup:
    lowConcurrencyWarmer:
      enabled: true
      events:
        - schedule: rate(5 minutes)
      concurrency: 1

# DRY constants: define all compound/generated names in one place
# Override args are: .. defaults:
# --app_acroym          signed-uploader
# --s3_bucket           self:custom.app_acronym
# --s3_key_base         self:custom.stage
# --region              us-east-1
# --stage               test
# --deletion_policy     delete

  app_acronym: ${opt:acronym, 'spike-toshi-api'}
  default_stage: local
  stage: ${opt:stage, self:custom.default_stage}
  stack_name: ${self:custom.app_acronym}-${self:custom.stage}
  region: ${opt:region, self:provider.region}
  deletion_policy: Delete
  # Default to using app_acronym as bucket name
  s3_bucket: ${opt:s3_bucket, self:custom.app_acronym}-${self:custom.stage}-v2
  # default to using ${stage} as key base path, keeps stages from namespace collisions
  s3_bucket_arn: arn:aws:s3:::${self:custom.s3_bucket}
  s3_role_resource: ${self:custom.s3_bucket_arn}
  # presigned URL TTL
  url_default_ttl: 60

  first_dynamo_id: ${env:FIRST_DYNAMO_ID, 100000}

provider:
  name: aws
  runtime: python3.12
  stage: ${opt:stage, 'dev'}
  region: ap-southeast-2
  stackName: ${self:custom.stack_name}-v2
  environment:
    REGION: ${self:custom.region}
    S3_BUCKET_NAME: ${self:custom.s3_bucket}
    URL_DEFAULT_TTL: ${self:custom.url_default_ttl}
    DEPLOYMENT_STAGE: ${self:custom.stage}
  iamRoleStatements:
    # S3 access policy
    - Effect: Allow
      Action:
        - s3:*
      Resource:
        - ${self:custom.s3_role_resource}
        - ${self:custom.s3_role_resource}/*
    -  Effect: Allow
       Action:
         - "cloudwatch:PutMetricData"
       Resource: "*"

    - Effect: Allow
      Action:
         - "dynamodb:Scan"
         - "dynamodb:Query"
         - "dynamodb:DescribeTable"
         - "dynamodb:CreateTable"
         - "dynamodb:GetItem"
         - "dynamodb:PutItem"
         - "dynamodb:ConditionCheckItem"
         - "dynamodb:UpdateItem"
      Resource: '*'

  apiGateway:
    apiKeys:
      - name: TempApiKey-${self:custom.stack_name}
        description: Api key until we have an auth function # Optional

functions:
  # JWT Lambda Authorizer (auth_migration/auth — replace x-api-key with Cognito JWTs)
  # To activate: set COGNITO_USER_POOL_ID, COGNITO_REGION, COGNITO_CLIENT_ID env vars
  # and replace `private: true` below with the `authorizer:` block shown in comments.
  jwtAuthorizer:
    handler: auth_migration/auth/authorizer/handler.handler
    description: Validates Cognito JWTs; accepts legacy x-api-key for backward compat
    memorySize: 256
    timeout: 10
    environment:
      COGNITO_USER_POOL_ID: ${env:COGNITO_USER_POOL_ID, 'ap-southeast-2_ww852jFvi'}
      COGNITO_REGION: ${self:provider.region}
      COGNITO_CLIENT_ID: ${env:COGNITO_CLIENT_ID, ''}
      LEGACY_API_KEY: ${env:LEGACY_API_KEY, ''}

  app:
    description: The graphql API of ${self:service}
    handler: wsgi_handler.handler
    memorySize: 2048 # optional, in MB, default is 1024
    timeout: 25 # optional, in seconds, default is 6
    events:
      - http:
          path: graphql
          method: OPTIONS
      - http:
          path: graphql
          method: POST
          authorizer:
            name: jwtAuthorizer
            resultTtlInSeconds: 0
            identitySource: context.requestId
            type: request
      - http:
          path: graphql
          method: GET
          authorizer:
            name: jwtAuthorizer
            resultTtlInSeconds: 0
            identitySource: context.requestId
            type: request
    environment:
      STACK_NAME: ${self:custom.stack_name}
      FIRST_DYNAMO_ID: ${self:custom.first_dynamo_id}
    warmup:
      lowConcurrencyWarmer:
        enabled:
          - test
          - prod

resources:
  Resources:
    ToshiBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.s3_bucket}

